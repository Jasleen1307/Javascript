    <!--Promises: used to manage asynchronous code effectively better than callback HTML elment .And advantages are easy to manage the code,easy to debug , code readabillity is good
    Promises has 3 states;
    Pending,fulfilled,rejected
    Promise consumers:
    1) .then(): when promise resolved then it is going to .then
    2) .catch(): when promise rejected it is going to .catch to handle the error.
    .finally():will run every time a promise defined wether the promise resolved or rejected
    Callback Queue:
    1) microtask:it will store promise.it will execute first.
    2) macrotask:it will storer rest of the asynch code
    Event Loops:it is a constantly running process which keeps trach of callback,when it found the callback is empty(when synch function excutes)then it will push one by one asynch function from callback queue to callstack-->
